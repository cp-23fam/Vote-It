<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Council — Room View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1114;
            --surface: #1a1d23;
            --border: rgba(255, 255, 255, 0.08);
            --text: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.35);

            --empty: #2a2d35;
            --empty-border: rgba(255, 255, 255, 0.1);
            --present: #3a3d48;
            --present-border: rgba(255, 255, 255, 0.2);

            --yes: #22a06b;
            --yes-bg: rgba(34, 160, 107, 0.18);
            --yes-border: rgba(34, 160, 107, 0.5);

            --no: #d93636;
            --no-bg: rgba(217, 54, 54, 0.18);
            --no-border: rgba(217, 54, 54, 0.5);

            --abstain: #4a7fd4;
            --abstain-bg: rgba(74, 127, 212, 0.18);
            --abstain-border: rgba(74, 127, 212, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .vote-title {
            font-size: 16px;
            font-weight: 600;
        }

        .vote-waiting {
            font-size: 14px;
            color: var(--text-muted);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 300ms;
        }

        .ws-dot.connected {
            background: var(--yes);
            animation: pulse 2s ease-in-out infinite;
        }

        .ws-dot.disconnected {
            background: #d93636;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* ── Tally bar ── */
        .tally {
            padding: 12px 28px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .tally-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--empty);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
        }

        .tally-seg {
            height: 100%;
            transition: width 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tally-counts {
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .tally-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .tally-num {
            font-size: 18px;
            font-weight: 700;
        }

        /* ── Room ── */
        .room-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Podium */
        .podium {
            width: 160px;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Rows */
        .rows {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 900px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .row-label {
            width: 24px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            flex-shrink: 0;
        }

        .seats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ── Seat ── */
        .seat {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            border: 1.5px solid var(--empty-border);
            background: var(--empty);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: default;
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .seat.present {
            background: var(--present);
            border-color: var(--present-border);
        }

        .seat.voted-yes {
            background: var(--yes-bg);
            border-color: var(--yes-border);
        }

        .seat.voted-no {
            background: var(--no-bg);
            border-color: var(--no-border);
        }

        .seat.voted-abstain {
            background: var(--abstain-bg);
            border-color: var(--abstain-border);
        }

        .seat-icon {
            font-size: 20px;
            line-height: 1;
        }

        .seat-name {
            font-size: 9px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
            max-width: 58px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 4px;
        }

        .seat.present .seat-name,
        .seat.voted-yes .seat-name,
        .seat.voted-no .seat-name,
        .seat.voted-abstain .seat-name {
            color: var(--text);
        }

        .seat-vote-label {
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .seat.voted-yes .seat-vote-label {
            color: var(--yes);
        }

        .seat.voted-no .seat-vote-label {
            color: var(--no);
        }

        .seat.voted-abstain .seat-vote-label {
            color: var(--abstain);
        }

        /* flash animation on vote */
        @keyframes flash {
            0% {
                opacity: 1;
                transform: scale(1.12);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .seat.flash {
            animation: flash 400ms ease-out;
        }

        /* ── No vote state ── */
        .no-vote {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <div class="ws-dot" id="wsDot"></div>
            <span class="vote-title" id="voteTitle">Waiting for vote...</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#2a2d35;border:1px solid rgba(255,255,255,0.1)"></div> Empty
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#3a3d48"></div> Present
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--yes)"></div> Yes
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--no)"></div> No
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--abstain)"></div> Abstain
            </div>
        </div>
    </div>

    <div class="tally" id="tally" style="display:none">
        <div class="tally-bar-wrap">
            <div class="tally-seg" id="barYes" style="background:var(--yes);width:0%"></div>
            <div class="tally-seg" id="barNo" style="background:var(--no);width:0%"></div>
            <div class="tally-seg" id="barAbstain" style="background:var(--abstain);width:0%"></div>
        </div>
        <div class="tally-counts">
            <div class="tally-count">
                <span style="color:var(--yes)">Yes</span>
                <span class="tally-num" id="countYes" style="color:var(--yes)">0</span>
            </div>
            <div class="tally-count">
                <span style="color:var(--no)">No</span>
                <span class="tally-num" id="countNo" style="color:var(--no)">0</span>
            </div>
            <div class="tally-count">
                <span style="color:var(--abstain)">Abstain</span>
                <span class="tally-num" id="countAbstain" style="color:var(--abstain)">0</span>
            </div>
        </div>
    </div>

    <div class="room-wrap" id="roomWrap">
        <div class="no-vote" id="noVote">No active vote.</div>
    </div>

    <script>
        // ── Config ────────────────────────────────────────────────
        const ROWS = 6        // number of rows
        const SEATS_PER_ROW = 8  // seats per row
        const ROW_LABELS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H']

        // ── State ─────────────────────────────────────────────────
        // seat key = "A1", "A2", etc.
        const seats = {}  // { [key]: { name: string|null, vote: 'Yes'|'No'|'Abstain'|null } }

        // init all seats as empty
        for (let r = 0; r < ROWS; r++) {
            for (let s = 1; s <= SEATS_PER_ROW; s++) {
                const key = ROW_LABELS[r] + s
                seats[key] = { name: null, vote: null }
            }
        }

        let voteActive = false

        // ── DOM refs ──────────────────────────────────────────────
        const wsDot = document.getElementById('wsDot')
        const voteTitle = document.getElementById('voteTitle')
        const tally = document.getElementById('tally')
        const roomWrap = document.getElementById('roomWrap')
        const noVote = document.getElementById('noVote')

        // ── Build room grid ───────────────────────────────────────
        function buildRoom() {
            noVote.remove()
            roomWrap.innerHTML = ''

            const podium = document.createElement('div')
            podium.className = 'podium'
            podium.textContent = 'Podium'
            roomWrap.appendChild(podium)

            const rowsEl = document.createElement('div')
            rowsEl.className = 'rows'

            for (let r = 0; r < ROWS; r++) {
                const rowEl = document.createElement('div')
                rowEl.className = 'row'

                const label = document.createElement('div')
                label.className = 'row-label'
                label.textContent = ROW_LABELS[r]
                rowEl.appendChild(label)

                const seatsEl = document.createElement('div')
                seatsEl.className = 'seats'

                for (let s = 1; s <= SEATS_PER_ROW; s++) {
                    const key = ROW_LABELS[r] + s
                    const seat = document.createElement('div')
                    seat.className = 'seat'
                    seat.id = `seat-${key}`
                    seat.innerHTML = `
          <div class="seat-icon">🪑</div>
          <div class="seat-name">${key}</div>
          <div class="seat-vote-label"></div>
        `
                    seatsEl.appendChild(seat)
                }

                rowEl.appendChild(seatsEl)
                rowsEl.appendChild(rowEl)
            }

            roomWrap.appendChild(rowsEl)
        }

        // ── Update a single seat ──────────────────────────────────
        function updateSeat(key) {
            const el = document.getElementById(`seat-${key}`)
            if (!el) return
            const { name, vote } = seats[key]

            // classes
            el.className = 'seat'
            if (vote === 'Yes') el.classList.add('voted-yes')
            else if (vote === 'No') el.classList.add('voted-no')
            else if (vote === 'Abstain') el.classList.add('voted-abstain')
            else if (name) el.classList.add('present')

            // icon
            const icon = el.querySelector('.seat-icon')
            if (vote) icon.textContent = vote === 'Yes' ? '✅' : vote === 'No' ? '❌' : '➖'
            else if (name) icon.textContent = '👤'
            else icon.textContent = '🪑'

            // name
            el.querySelector('.seat-name').textContent = name ?? key

            // vote label
            el.querySelector('.seat-vote-label').textContent = vote ?? ''
        }

        // flash effect when someone votes
        function flashSeat(key) {
            const el = document.getElementById(`seat-${key}`)
            if (!el) return
            el.classList.remove('flash')
            void el.offsetWidth // reflow
            el.classList.add('flash')
        }

        // ── Update tally bar ──────────────────────────────────────
        function updateTally(results) {
            const total = (results.Yes ?? 0) + (results.No ?? 0) + (results.Abstain ?? 0)
            const pct = (n) => total ? Math.round((n / total) * 100) : 0

            document.getElementById('countYes').textContent = results.Yes ?? 0
            document.getElementById('countNo').textContent = results.No ?? 0
            document.getElementById('countAbstain').textContent = results.Abstain ?? 0
            document.getElementById('barYes').style.width = pct(results.Yes ?? 0) + '%'
            document.getElementById('barNo').style.width = pct(results.No ?? 0) + '%'
            document.getElementById('barAbstain').style.width = pct(results.Abstain ?? 0) + '%'
        }

        // ── WebSocket ─────────────────────────────────────────────
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws'
            const ws = new WebSocket(`${proto}://${location.host}/ws`)

            ws.onopen = () => {
                wsDot.className = 'ws-dot connected'
                ws.send(JSON.stringify({ type: 'IDENTIFY', role: 'room' }))
            }

            ws.onclose = () => {
                wsDot.className = 'ws-dot disconnected'
                setTimeout(connect, 3000)
            }

            ws.onmessage = ({ data }) => {
                const msg = JSON.parse(data)
                handle(msg)
            }
        }

        function handle(msg) {
            switch (msg.type) {

                // a member scanned their QR and connected to a seat
                case 'SEAT_JOINED':
                    // msg: { seat_id: "A3", name: "Marie Dupont" }
                    seats[msg.seat_id].name = msg.name
                    seats[msg.seat_id].vote = null
                    updateSeat(msg.seat_id)
                    break

                // vote started
                case 'VOTE_STARTED':
                    // msg: { vote_id, title }
                    voteActive = true
                    voteTitle.textContent = msg.title
                    tally.style.display = 'flex'
                    // reset all votes
                    Object.keys(seats).forEach(k => { seats[k].vote = null; updateSeat(k) })
                    buildRoom()
                    // re-render seats with current presence
                    Object.keys(seats).forEach(k => updateSeat(k))
                    updateTally({ Yes: 0, No: 0, Abstain: 0 })
                    break

                // someone voted — per-seat update
                case 'SEAT_VOTED':
                    // msg: { seat_id: "A3", vote: "Yes", results: { Yes: n, No: n, Abstain: n } }
                    seats[msg.seat_id].vote = msg.vote
                    updateSeat(msg.seat_id)
                    flashSeat(msg.seat_id)
                    updateTally(msg.results)
                    break

                // president closed the vote
                case 'VOTE_CLOSED':
                    // msg: { results: { Yes, No, Abstain } }
                    voteActive = false
                    voteTitle.textContent = voteTitle.textContent + ' — Closed'
                    updateTally(msg.results)
                    break

                // full state sync (useful on reconnect)
                case 'ROOM_STATE':
                    // msg: { vote: { title } | null, seats: { "A1": { name, vote } }, results }
                    if (msg.vote) {
                        voteTitle.textContent = msg.vote.title
                        tally.style.display = 'flex'
                        buildRoom()
                    }
                    Object.entries(msg.seats ?? {}).forEach(([key, data]) => {
                        if (seats[key]) {
                            seats[key].name = data.name
                            seats[key].vote = data.vote
                            updateSeat(key)
                        }
                    })
                    if (msg.results) updateTally(msg.results)
                    break
            }
        }

        // ── Init ──────────────────────────────────────────────────
        buildRoom()
        connect()
    </script>
</body>

</html>
