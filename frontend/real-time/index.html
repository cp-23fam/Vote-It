<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Council — Room Ba94</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1114;
            --surface: #1a1d23;
            --border: rgba(255, 255, 255, 0.08);
            --text: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.35);
            --yes: #22a06b;
            --yes-bg: rgba(34, 160, 107, 0.2);
            --yes-border: rgba(34, 160, 107, 0.55);
            --no: #d93636;
            --no-bg: rgba(217, 54, 54, 0.2);
            --no-border: rgba(217, 54, 54, 0.55);
            --abstain: #4a7fd4;
            --abstain-bg: rgba(74, 127, 212, 0.2);
            --abstain-border: rgba(74, 127, 212, 0.55);
            --empty: #22252d;
            --present: #32363f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .room-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .vote-title {
            font-size: 15px;
            font-weight: 600;
        }

        .ws-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .ws-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #444;
        }

        .ws-dot.connected {
            background: var(--yes);
            animation: pulse 2s ease-in-out infinite;
        }

        .ws-dot.disconnected {
            background: var(--no);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 2px;
        }

        .tally {
            padding: 10px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .tally-bar-wrap {
            flex: 1;
            height: 5px;
            background: #2a2d35;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
        }

        .tally-seg {
            height: 100%;
            transition: width 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tally-counts {
            display: flex;
            gap: 20px;
        }

        .tally-count {
            display: flex;
            align-items: baseline;
            gap: 5px;
            font-size: 12px;
        }

        .tally-num {
            font-size: 20px;
            font-weight: 700;
        }

        .room-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            align-self: flex-start;
            margin-bottom: 10px;
        }

        .section-divider {
            width: 100%;
            max-width: 900px;
            border: none;
            border-top: 1px dashed rgba(255, 255, 255, 0.07);
            margin: 18px 0;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }

        .row-label {
            width: 22px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: right;
            flex-shrink: 0;
        }

        .seats {
            display: flex;
            gap: 5px;
        }

        .seat {
            width: 54px;
            height: 54px;
            border-radius: 7px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            background: var(--empty);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            position: relative;
            transition: background 350ms ease, border-color 350ms ease;
            overflow: hidden;
        }

        .seat.present {
            background: var(--present);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .seat.voted-yes {
            background: var(--yes-bg);
            border-color: var(--yes-border);
        }

        .seat.voted-no {
            background: var(--no-bg);
            border-color: var(--no-border);
        }

        .seat.voted-abstain {
            background: var(--abstain-bg);
            border-color: var(--abstain-border);
        }

        .seat-icon {
            font-size: 17px;
            line-height: 1;
        }

        .seat-id {
            font-size: 9px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .seat.present .seat-id,
        .seat.voted-yes .seat-id,
        .seat.voted-no .seat-id,
        .seat.voted-abstain .seat-id {
            color: rgba(255, 255, 255, 0.55);
        }

        .seat-name-label {
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 7px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 3px;
        }

        @keyframes flash {
            0% {
                transform: scale(1.14)
            }

            100% {
                transform: scale(1)
            }
        }

        .seat.flash {
            animation: flash 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .podium-wrap {
            margin-top: 20px;
        }

        .podium {
            width: 180px;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .no-vote-msg {
            color: var(--text-muted);
            font-size: 14px;
            padding: 60px 0;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <div class="ws-indicator">
                <div class="ws-dot" id="wsDot"></div>
                <span id="wsLabel">Connecting...</span>
            </div>
            <span class="room-label">Ba94</span>
            <span class="vote-title" id="voteTitle">No active vote</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--empty);border:1px solid rgba(255,255,255,0.1)"></div>
                Empty
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--present)"></div>Present
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--yes)"></div>Yes
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--no)"></div>No
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--abstain)"></div>Abstain
            </div>
        </div>
    </div>

    <div class="tally" id="tally" style="display:none">
        <div class="tally-bar-wrap">
            <div class="tally-seg" id="barYes" style="background:var(--yes)"></div>
            <div class="tally-seg" id="barNo" style="background:var(--no)"></div>
            <div class="tally-seg" id="barAbstain" style="background:var(--abstain)"></div>
        </div>
        <div class="tally-counts">
            <div class="tally-count">
                <span style="color:var(--yes)">Yes</span>
                <span class="tally-num" id="countYes" style="color:var(--yes)">0</span>
            </div>
            <div class="tally-count">
                <span style="color:var(--no)">No</span>
                <span class="tally-num" id="countNo" style="color:var(--no)">0</span>
            </div>
            <div class="tally-count">
                <span style="color:var(--abstain)">Abstain</span>
                <span class="tally-num" id="countAbstain" style="color:var(--abstain)">0</span>
            </div>
            <div class="tally-count" style="margin-left:6px;border-left:1px solid var(--border);padding-left:14px">
                <span style="color:var(--text-muted)">Total</span>
                <span class="tally-num" id="countTotal" style="color:var(--text-muted)">0</span>
            </div>
        </div>
    </div>

    <div class="room-wrap" id="roomWrap">
        <p class="no-vote-msg" id="noVoteMsg">Waiting for a vote to start...</p>
    </div>

    <script>
        // ── Room layout matching Ba94 floor plan ──────────────────
        // Top section: 5 rows of varying width
        // Bottom section: 6 rows of 12
        const LAYOUT = [
            // Top section (front of room)
            { row: 'A', seats: 10 },
            { row: 'B', seats: 10 },
            { row: 'C', seats: 10 },
            { row: 'D', seats: 10 },
            { row: 'E', seats: 10 },
            // Bottom section
            { row: 'F', seats: 12 },
            { row: 'G', seats: 12 },
            { row: 'H', seats: 12 },
            { row: 'I', seats: 12 },
            { row: 'J', seats: 12 },
            { row: 'K', seats: 12 },
        ]

        const BOTTOM_START = 'F'

        // ── State ─────────────────────────────────────────────────
        const seatState = {}
        LAYOUT.forEach(({ row, seats }) => {
            for (let i = 1; i <= seats; i++) {
                seatState[row + i] = { name: null, vote: null }
            }
        })

        // ── Build DOM ─────────────────────────────────────────────
        function buildRoom() {
            const wrap = document.getElementById('roomWrap')
            wrap.innerHTML = ''

            let sectionStarted = false

            LAYOUT.forEach(({ row, seats }) => {
                // Insert divider before bottom section
                if (row === BOTTOM_START && !sectionStarted) {
                    sectionStarted = true
                    const hr = document.createElement('hr')
                    hr.className = 'section-divider'
                    wrap.appendChild(hr)

                    const lbl = document.createElement('div')
                    lbl.className = 'section-label'
                    lbl.textContent = 'Main section — 12 seats per row'
                    wrap.appendChild(lbl)
                }

                if (row === 'A') {
                    const lbl = document.createElement('div')
                    lbl.className = 'section-label'
                    lbl.textContent = 'Back section'
                    wrap.appendChild(lbl)
                }

                const rowEl = document.createElement('div')
                rowEl.className = 'row'

                const label = document.createElement('div')
                label.className = 'row-label'
                label.textContent = row
                rowEl.appendChild(label)

                const seatsEl = document.createElement('div')
                seatsEl.className = 'seats'

                for (let i = 1; i <= seats; i++) {
                    const id = row + i
                    const el = document.createElement('div')
                    el.className = 'seat'
                    el.id = 'seat-' + id
                    el.innerHTML = `
          <div class="seat-icon">🪑</div>
          <div class="seat-id">${id}</div>
          <div class="seat-name-label"></div>
        `
                    seatsEl.appendChild(el)
                }

                rowEl.appendChild(seatsEl)
                wrap.appendChild(rowEl)
            })

            const podiumWrap = document.createElement('div')
            podiumWrap.className = 'podium-wrap'
            podiumWrap.innerHTML = `<div class="podium">💻 Podium</div>`
            wrap.appendChild(podiumWrap)
        }

        // ── Render one seat ───────────────────────────────────────
        function updateSeat(id) {
            const el = document.getElementById('seat-' + id)
            if (!el) return
            const { name, vote } = seatState[id]

            el.className = 'seat'
            if (vote === 'Yes') el.classList.add('voted-yes')
            else if (vote === 'No') el.classList.add('voted-no')
            else if (vote === 'Abstain') el.classList.add('voted-abstain')
            else if (name) el.classList.add('present')

            const icon = el.querySelector('.seat-icon')
            if (vote === 'Yes') icon.textContent = '✅'
            else if (vote === 'No') icon.textContent = '❌'
            else if (vote === 'Abstain') icon.textContent = '➖'
            else if (name) icon.textContent = '👤'
            else icon.textContent = '🪑'

            el.querySelector('.seat-id').textContent = id
            el.querySelector('.seat-name-label').textContent = name ?? ''
        }

        function flashSeat(id) {
            const el = document.getElementById('seat-' + id)
            if (!el) return
            el.classList.remove('flash')
            void el.offsetWidth
            el.classList.add('flash')
        }

        // ── Tally ─────────────────────────────────────────────────
        function updateTally(results) {
            const y = results.Yes ?? 0
            const n = results.No ?? 0
            const a = results.Abstain ?? 0
            const total = y + n + a
            const pct = v => total ? Math.round(v / total * 100) : 0

            document.getElementById('countYes').textContent = y
            document.getElementById('countNo').textContent = n
            document.getElementById('countAbstain').textContent = a
            document.getElementById('countTotal').textContent = total
            document.getElementById('barYes').style.width = pct(y) + '%'
            document.getElementById('barNo').style.width = pct(n) + '%'
            document.getElementById('barAbstain').style.width = pct(a) + '%'
        }

        // ── WebSocket ─────────────────────────────────────────────
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws'
            const ws = new WebSocket(`${proto}://${location.host}/ws`)

            ws.onopen = () => {
                document.getElementById('wsDot').className = 'ws-dot connected'
                document.getElementById('wsLabel').textContent = 'Live'
                ws.send(JSON.stringify({ type: 'IDENTIFY', role: 'room' }))
            }

            ws.onclose = () => {
                document.getElementById('wsDot').className = 'ws-dot disconnected'
                document.getElementById('wsLabel').textContent = 'Reconnecting...'
                setTimeout(connect, 3000)
            }

            ws.onmessage = ({ data }) => handle(JSON.parse(data))
        }

        function handle(msg) {
            switch (msg.type) {

                case 'VOTE_STARTED':
                    document.getElementById('voteTitle').textContent = msg.title
                    document.getElementById('tally').style.display = 'flex'
                    Object.keys(seatState).forEach(id => { seatState[id].vote = null; updateSeat(id) })
                    updateTally({ Yes: 0, No: 0, Abstain: 0 })
                    break

                case 'SEAT_JOINED':
                    // { seat_id: "A3", name: "Marie Dupont" }
                    if (seatState[msg.seat_id]) {
                        seatState[msg.seat_id].name = msg.name
                        updateSeat(msg.seat_id)
                    }
                    break

                case 'SEAT_VOTED':
                    // { seat_id: "A3", vote: "Yes", results: { Yes, No, Abstain } }
                    if (seatState[msg.seat_id]) {
                        seatState[msg.seat_id].vote = msg.vote
                        updateSeat(msg.seat_id)
                        flashSeat(msg.seat_id)
                    }
                    updateTally(msg.results)
                    break

                case 'VOTE_CLOSED':
                    document.getElementById('voteTitle').textContent += ' — Closed'
                    updateTally(msg.results)
                    break

                case 'ROOM_STATE':
                    // sent by backend on connect to sync current state
                    // { vote: { title } | null, seats: { "A3": { name, vote } }, results }
                    if (msg.vote) {
                        document.getElementById('voteTitle').textContent = msg.vote.title
                        document.getElementById('tally').style.display = 'flex'
                    }
                    Object.entries(msg.seats ?? {}).forEach(([id, data]) => {
                        if (seatState[id]) {
                            seatState[id].name = data.name
                            seatState[id].vote = data.vote
                            updateSeat(id)
                        }
                    })
                    if (msg.results) updateTally(msg.results)
                    break
            }
        }

        buildRoom()
        connect()
    </script>
</body>

</html>
